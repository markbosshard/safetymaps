const CITYLEVEL=Object.keys(CITIES).filter(k=>(CITIES[k].tier_level||'city')==='city').sort((a,b)=>CITIES[a].name.localeCompare(CITIES[b].name,'en'));
function dashSlug(s){return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
const SLUG={},FROMSLUG={};
Object.keys(CITIES).forEach(k=>{const s=dashSlug(CITIES[k].name);SLUG[k]=s;FROMSLUG[s]=k;FROMSLUG[k.toLowerCase()]=k;FROMSLUG[s.replace(/-/g,'')]=k;if(CITIES[k].slug)FROMSLUG[String(CITIES[k].slug).toLowerCase()]=k;});
Object.assign(FROMSLUG,{cdmx:'mexico-city',mexico:'mexico-city',riodejaneiro:'rio-de-janeiro',ba:'buenos-aires',sp:'sao-paulo',cuzco:'cusco',saopaulo:'sao-paulo'});
// Accent-insensitive, slightly typo-tolerant matching of a query against our predefined cities.
function cityNorm(s){return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]/g,'');}
function lev(a,b){const m=a.length,n=b.length;if(Math.abs(m-n)>2)return 9;const d=Array.from({length:m+1},(_,i)=>[i]);for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function cityMatch(q,limit){
  const nq=cityNorm(q); if(nq.length<2)return [];
  const out=[];
  for(const k of Object.keys(CITIES)){
    const nn=cityNorm(CITIES[k].name);
    let rank;
    if(nn===nq)rank=0; else if(nn.startsWith(nq))rank=1; else if(nn.includes(nq))rank=2;
    else if(nq.length>=4 && lev(nq,nn)<=1)rank=3; else continue;
    out.push({key:k,name:CITIES[k].name,rank});
  }
  out.sort((a,b)=>a.rank-b.rank || a.name.localeCompare(b.name,'en'));
  return out.slice(0,limit||8);
}
// Pretty path routing: /sao-paulo, /mexico-city … with legacy #saopaulo and ?city= still accepted.
function keyFromUrl(){
  let seg=decodeURIComponent(location.pathname).replace(/^\/+|\/+$/g,'');
  seg=seg.replace(/\.html$/i,''); if(seg==='index'||seg==='404')seg='';
  let raw=(seg||location.hash.replace(/^#\/?/,'')||new URLSearchParams(location.search).get('city')||'').toLowerCase();
  if(CITIES[FROMSLUG[raw]])return FROMSLUG[raw];
  let s=raw.replace(/[^a-z0-9]/g,'');
  return CITIES[FROMSLUG[s]]?FROMSLUG[s]:(CITIES[raw]?raw:'sao-paulo');
}
let cityKey='sao-paulo';
// GoatCounter: count one pageview per city (SPA). Each city has its own path (/sao-paulo …), so the
// GoatCounter "Paths" report directly shows which cities are viewed most. We count manually on each
// city change; no_onload stops the default load-time count (which would log a stray "/").
window.goatcounter=window.goatcounter||{}; window.goatcounter.no_onload=true;
let gcLast=null;
function gcCount(){ if(!(window.goatcounter&&window.goatcounter.count))return; const p=location.pathname||'/'; if(p===gcLast)return; gcLast=p;
  try{window.goatcounter.count({path:p,title:(typeof overviewOn!=='undefined'&&overviewOn)?'Latin America':((CITIES[cityKey]&&CITIES[cityKey].name)||document.title)});}catch(e){} }
function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function lerp(a,b,t){return a+(b-a)*t}
function color(s){
  if(s==null) return '#5b6472';

  for(let i=1;i<CMAP.length;i++){ if(t<=CMAP[i][0]){
    const [t0,c0]=CMAP[i-1],[t1,c1]=CMAP[i],u=(t-t0)/((t1-t0)||1),a=hx(c0),b=hx(c1);

  return CMAP[CMAP.length-1][1];

function onTileOk(){tileOk=true;hint.style.display='none';}

let LANDMASK=null,landmaskReq=null;
function loadLandmask(){ if(LANDMASK)return Promise.resolve(LANDMASK);
  if(!landmaskReq) landmaskReq=fetch('landmask.json').then(r=>r.json()).then(j=>LANDMASK=j).catch(()=>LANDMASK={land:[],lakes:[]});
  return landmaskReq; }
function ptInPoly(x,y,poly){ if(!ptInRing(x,y,poly[0]))return false; for(let h=1;h<poly.length;h++)if(ptInRing(x,y,poly[h]))return false; return true; }
function ptInPolys(x,y,polys){ for(const p of polys)if(ptInPoly(x,y,p))return true; return false; }
function nearLand(lat,lng,m,km){ if(ptInPolys(lng,lat,m.land))return true;
  const dLat=km/111,dLon=km/(111*Math.cos(lat*Math.PI/180));
  for(let a=0;a<12;a++){const t=a*Math.PI/6; if(ptInPolys(lng+dLon*Math.sin(t),lat+dLat*Math.cos(t),m.land))return true;}
  return false; }
async function isWater(lat,lng){
  const m=await loadLandmask();
  if(!m.land||!m.land.length)return false;          // mask unavailable -> don't block
  if(ptInPolys(lng,lat,m.lakes))return true;        // inside a lake / large lagoon
  return !nearLand(lat,lng,m,2);                     // not on or near land -> water
}
// Click anywhere on a focused city (incl. the periphery / outside a single bubble) to report there.
// District clicks are handled by the per-layer handler; here we only catch clicks outside any district.
map.on('click',async e=>{
  const ll=e.latlng;
  // Zoomed out (overview OR below the report zoom) a city is just a dot — clicking opens it, never a pin.
  if(overviewOn || map.getZoom()<REPORT_MIN_Z){ const k=cityAt(ll.lng,ll.lat); if(k) focusCity(k); return; }
  // If the click landed in a DIFFERENT city's footprint, open that city instead of trying to report here.
  const other=cityAt(ll.lng,ll.lat); if(other && other!==cityKey){ focusCity(other); return; }
  const C=CITIES[cityKey]; if(!C||!C.districts)return;
  if(districtAt(ll.lng,ll.lat))return;
  if(!withinReportRange(ll.lat,ll.lng)){ toast('That spot is outside '+C.name+'. Zoom to the city you want to report in.',5000,true); return; }
  showReportPoint(ll.lat,ll.lng);                                  // instant feedback while we check
  if(await isWater(ll.lat,ll.lng)){ clearReportPoint(); toast('That looks like water — please pick a spot on land.',5000,true); return; }
  if(!reportPin)return;                                            // popup/pin was cleared meanwhile
  openPointReport(ll); });
// Geocoder: autocomplete dropdown of districts + MapTiler places. Nothing zooms until a row is picked.
const searchInput=document.getElementById('searchInput');
const searchResults=document.getElementById('searchResults');
let searchSeq=0,searchTimer=null,sresItems=[],sresActive=-1;
function hideResults(){searchResults.classList.add('hidden');searchResults.innerHTML='';sresItems=[];sresActive=-1;searchInput.setAttribute('aria-expanded','false');}
function rankName(name,ql){const n=name.toLowerCase();return n===ql?0:n.startsWith(ql)?1:2;}
function districtSuggest(q){
  const ql=q.toLowerCase(),C=CITIES[cityKey];
  return (C.districts||[]).filter(d=>d.name.toLowerCase().includes(ql))
    .sort((a,b)=>rankName(a.name,ql)-rankName(b.name,ql)).slice(0,3)
    .map(d=>({type:'district',name:d.name,sub:(C.model==='city'?'Area · ':'District · ')+C.name,lat:d.label[1],lon:d.label[0],_d:d}));
}
async function geocodeList(q){
  const C=CITIES[cityKey],[W,S,E,N]=C.bbox;
  if(MAPTILER_KEY){
    const cx=((W+E)/2).toFixed(5),cy=((S+N)/2).toFixed(5);
    const url=`https://api.maptiler.com/geocoding/${encodeURIComponent(q)}.json?key=${MAPTILER_KEY}&autocomplete=true&limit=5&language=en&country=${C.country}&bbox=${W},${S},${E},${N}&proximity=${cx},${cy}`;
    const r=await fetch(url);const j=await r.json();
    return (((j&&j.features)||[]).map(f=>({type:'place',name:(f.text||(f.place_name||'').split(',')[0]),sub:f.place_name||'',lat:f.center[1],lon:f.center[0]})));
  }
  const url=`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=5&accept-language=en&countrycodes=${C.country}&viewbox=${W},${N},${E},${S}&bounded=1&q=`+encodeURIComponent(q);
  const r=await fetch(url);const j=await r.json();
  return (j||[]).map(o=>({type:'place',name:(o.display_name||'').split(',')[0],sub:o.display_name||'',lat:+o.lat,lon:+o.lon}));
}
function renderResults(items,note){
  sresItems=items;sresActive=-1;let h='';
  items.forEach((it,i)=>{const tag=it.type==='district'?'<span class="stag">Area</span>':it.type==='city'?'<span class="stag">City</span>':'';
    h+=`<button type="button" role="option" class="sres" data-i="${i}"><span class="sname">${esc(it.name)}${tag}</span>${it.sub?`<span class="ssub">${esc(it.sub)}</span>`:''}</button>`;});
  if(!items.length)h=`<div class="sres note">${esc(note||'No matches found')}</div>`;
  searchResults.innerHTML=h;searchResults.classList.remove('hidden');searchInput.setAttribute('aria-expanded','true');
}
function setActive(i){const btns=searchResults.querySelectorAll('.sres[data-i]');if(!btns.length)return;
  sresActive=(i+btns.length)%btns.length;btns.forEach(b=>b.classList.remove('active'));
  btns[sresActive].classList.add('active');btns[sresActive].scrollIntoView({block:'nearest'});}
function selectResult(it){
  if(!it)return; if(typeof jr==='object')jr.searches++; hideResults(); collapseSearch(); searchInput.value=it.name; searchInput.blur();
  if(it.type==='city'){ focusCity(it.key); return; }
  dropPin(it.lat,it.lon); map.flyTo([it.lat,it.lon],14);
  if(it.type==='district'&&it._d){openDistrict(it._d,[it.lat,it.lon]);return;}
  const d=districtAt(it.lon,it.lat);
  if(d){openDistrict(d,[it.lat,it.lon]);return;}
  popupCtx={areaName:it.name||'this spot',cluster_id:null,lat:it.lat,lng:it.lon};
  const where=esc((it.sub||'').split(',').slice(1,3).join(',').trim())||'outside the mapped areas';
  reportPopup=L.popup({maxWidth:240,autoPanPadding:[16,16],keepInView:true,offset:[0,-18]})
    .setLatLng([it.lat,it.lon]).setContent(`<b>${esc(it.name)}</b><br><small style="color:#56627a">${where}</small>`+RHERE()+actionRow()).openOn(map);
  showReportPoint(it.lat,it.lon);
}
async function runSuggest(q){
  const seq=++searchSeq;
  const cities=cityMatch(q,3).map(c=>({type:'city',name:c.name,sub:'City · open the map',key:c.key}));
  // In the continent overview no single city is loaded, so only offer city matches — never geocode
  // addresses against a default city (which made São Paulo results appear out of nowhere).
  if(overviewOn){ renderResults(cities, 'Open a city first to search places within it'); if(!cities.length)logSearchMiss(q); return; }
  const locals=districtSuggest(q);
  if(cities.length||locals.length)renderResults([...cities,...locals]);
  let places; try{places=await geocodeList(q);}catch(e){places=undefined;}
  if(seq!==searchSeq)return;
  if(places===undefined&&!cities.length&&!locals.length){renderResults([],'Search needs the live site');return;}
  const items=[...cities,...locals];
  for(const p of (places||[])){if(items.length>=6)break;
    const pn=cityNorm(p.name);
    if(items.some(x=>{const xn=cityNorm(x.name);return xn===pn||(xn&&pn&&(xn.startsWith(pn)||pn.startsWith(xn)))||(x.lat!=null&&Math.abs(x.lat-p.lat)<0.01&&Math.abs(x.lon-p.lon)<0.01);}))continue;
    items.push(p);}
  renderResults(items);
  if(!items.length)logSearchMiss(q);
}
function onType(){const q=searchInput.value.trim();
  if(q.length<2){hideResults();return;}
  renderResults([],'Searching…'); runSuggest(q);}
searchInput.addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(onType,260);updateSearchClear();});
// Clear (×) button: appears once there's a query or a dropped search pin; empties the field and removes the pin.
const searchClearBtn=document.getElementById('searchClear');
function updateSearchClear(){ if(searchClearBtn) searchClearBtn.classList.toggle('hidden', !(searchInput.value.trim() || searchPin)); }
if(searchClearBtn) searchClearBtn.onclick=()=>{ if(searchPin){map.removeLayer(searchPin);searchPin=null;} searchInput.value=''; hideResults(); updateSearchClear(); searchInput.focus(); };
searchInput.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();searchResults.classList.contains('hidden')?onType():setActive(sresActive+1);}
  else if(e.key==='ArrowUp'){e.preventDefault();setActive(sresActive-1);}
  else if(e.key==='Enter'){e.preventDefault();
    if(sresActive>=0&&sresItems[sresActive])selectResult(sresItems[sresActive]);
    else if(sresItems.length)selectResult(sresItems[0]);
    else{clearTimeout(searchTimer);onType();}}
  else if(e.key==='Escape'){hideResults();}});
searchResults.addEventListener('click',e=>{const b=e.target.closest('.sres[data-i]');if(b)selectResult(sresItems[+b.dataset.i]);});
searchInput.addEventListener('focus',()=>{if(searchInput.value.trim().length>=2&&sresItems.length)searchResults.classList.remove('hidden');});
document.getElementById('searchBtn').addEventListener('click',()=>{const q=searchInput.value.trim();
  if(q.length<2){searchInput.focus();return;} clearTimeout(searchTimer); onType(); searchInput.focus();});
document.addEventListener('click',e=>{if(!e.target.closest('#search')&&!e.target.closest('#searchToggle'))hideResults();});
// Mobile: search starts collapsed to an icon (next to the email icon); tap it to reveal the input row.
function collapseSearch(){const s=document.getElementById('search');if(!s.classList.contains('open'))return;
  s.classList.remove('open');const st=document.getElementById('searchToggle');if(st){st.classList.remove('on');st.setAttribute('aria-expanded','false');}}
const searchToggle=document.getElementById('searchToggle');
searchToggle.addEventListener('click',()=>{const s=document.getElementById('search');
  if(s.classList.contains('open')){collapseSearch();hideResults();}
  else{s.classList.add('open');searchToggle.classList.add('on');searchToggle.setAttribute('aria-expanded','true');setTimeout(()=>searchInput.focus(),0);}});
// Like keyFromUrl but returns null when no city is named (the bare "/" home) instead of defaulting.
function explicitCity(){
  let seg=decodeURIComponent(location.pathname).replace(/^\/+|\/+$/g,'');
  seg=seg.replace(/\.html$/i,''); if(seg==='index'||seg==='404')seg='';
  let raw=(seg||location.hash.replace(/^#\/?/,'')||new URLSearchParams(location.search).get('city')||'').toLowerCase();
  if(!raw)return null;
  if(CITIES[FROMSLUG[raw]])return FROMSLUG[raw];
  let s=raw.replace(/[^a-z0-9]/g,'');
  return CITIES[FROMSLUG[s]]?FROMSLUG[s]:(CITIES[raw]?raw:null);
}
// Home = the whole continent: fit all city markers and show the overview (no single city focused).
function showOverviewHome(){
  let mnLa=90,mxLa=-90,mnLo=180,mxLo=-180;
  Object.keys(CITIES).forEach(k=>{const c=centerOf(k);if(c[0]<mnLa)mnLa=c[0];if(c[0]>mxLa)mxLa=c[0];if(c[1]<mnLo)mnLo=c[1];if(c[1]>mxLo)mxLo=c[1];});
  map.fitBounds([[mnLa,mnLo],[mxLa,mxLo]],{padding:[30,30]});
  setOverview(true); sizeOverview();
}
// Onboarding overlay (dismiss with OK, backdrop, or Esc). Shown on the first 3 page loads, then retired.
function showWelcome(){
  if(typeof jr==='object')jr.welcomeShown=1; _curModal='welcome';
  setModal(
    '<h3>Latam Crime Map</h3>'+
    '<p class="msub">'+t('welcome_body',
      'Zoom in or pick a major city like <b>Mexico City</b> or <b>São Paulo</b>.<br><br>'+
      'Your honest feedback — just <b>click the map</b> where something happened — makes this map smarter, and more detailed cities are coming soon.<br><br>'+
      'Thank you!')+'</p>'+
    '<div class="mrow"><button class="mbtn primary" onclick="closeModal()">'+t('ok','OK')+'</button></div>'
  );
}
// Re-apply saved transparency / basemap / toggles before the first paint.
function restoreSettings(){
  const o=lsGet('sm_opacity'); if(o!=null&&!isNaN(+o)){opacity=Math.min(1,Math.max(0,+o));const op=document.getElementById('op');if(op)op.value=Math.round((1-opacity)*100);}
  const b=lsGet('sm_basemap'); if(b&&bases[b]&&b!==curKey){try{map.removeLayer(curBase);}catch(e){}curKey=b;curBase=bases[curKey].addTo(map);curBase.bringToBack();applyLabelColor();const bs=document.getElementById('base');if(bs)bs.value=b;}
  const lb=lsGet('sm_labels'); if(lb!=null){showLabels=(lb==='true');document.getElementById('lbl').checked=showLabels;}
  const bo=lsGet('sm_borders'); if(bo!=null){showBorders=(bo==='true');document.getElementById('bord').checked=showBorders;}
  if(lsGet('sm_more')==='1'&&typeof setMore==='function')setMore(true);   // remember an expanded "More settings"
  restyle();
}
// Focus a city on load: center+zoom first (fitBounds can land a big metro at <=OVERVIEW_Z and bounce
// straight back to the overview), then build without re-fitting. Mirrors the marker-click path.
// Focus a city without fitBounds: a big metro can fit at <=OVERVIEW_Z and bounce straight back to the
// overview (updateView). Centre + fixed city zoom avoids that. Use for ALL city selection (load, dropdown,
// search, back/forward) — only the overview marker click can flyTo + buildCity safely on its own.
function focusCity(key,opts){
  // Close any open report popup + pin first: their keepInView/autoPan would otherwise fight setView and
  // drag the map back toward the old city (e.g. a live Rio pin blocking a jump to São Paulo).
  try{map.closePopup();}catch(e){} if(typeof clearReportPoint==='function')clearReportPoint();
  setOverview(false);
  map.setView(centerOf(key), CITIES[key].tier_level==='detailed'?11:10, {animate:false});
  buildCity(key,Object.assign({fit:false},opts||{}));
}
function init(tries){ tries=tries||0; try{map.invalidateSize();}catch(e){}
  if(!map.getSize().x && tries<20){ return setTimeout(()=>init(tries+1),60); }
  restoreSettings();
  flushQueue();                                   // re-send any reports queued while offline
  const loads=(parseInt(lsGet('sm_loadcount')||'0',10)||0)+1; persist('sm_loadcount',loads);
  const k=explicitCity();
  let onCity=false;
  if(k){ focusCity(k); onCity=true; }
  else { const last=lsGet('sm_lastcity');
    if(loads>=2 && last && CITIES[last]){ focusCity(last); onCity=true; } else { showOverviewHome(); } }
  // The zoom-in welcome only makes sense when landing on the continent overview. When a city is loaded on
  // page load, we instead nudge with the rating CTA (updateContribUi, first 3 loads, only if never rated).
  if(!onCity && loads<=3) showWelcome();
  track('session',{city: onCity ? (explicitCity()||lsGet('sm_lastcity')||null) : null});
}
if(document.readyState==='complete') init(); else window.addEventListener('load',init);
window.addEventListener('popstate',()=>{const k=explicitCity(); if(!k){showOverviewHome();return;} if(k!==cityKey) focusCity(k,{fromPop:true});});
window.addEventListener('hashchange',()=>{const k=explicitCity(); if(!k){showOverviewHome();return;} if(k!==cityKey) focusCity(k);});
</script>
