<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="darkreader-lock"/><meta name="color-scheme" content="dark"/>
<title>Latin America — City Safety Maps</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
 :root{--ink:#0d1426;--panel:#101a2e;--line:#26324a;--muted:#8896ad}
 *{box-sizing:border-box}
 html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--ink);color:#e8eef6}
 #app{position:fixed;inset:0;display:flex;flex-direction:column}
 header{padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:center;flex-wrap:wrap;position:relative;z-index:1200}
 .hbtn{-webkit-appearance:none;appearance:none;background:#0b1322;border:1px solid var(--line);color:#cdd6e4;border-radius:8px;width:36px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;padding:0;transition:.12s}
 .hbtn:hover,.hbtn.on{border-color:#3a4660;color:#fff;background:#16223a}
 .hbtn svg{width:18px;height:18px}
 .vote{margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
 .leaflet-popup-content{margin:10px 12px;max-width:240px}
 .vbtn{-webkit-appearance:none;appearance:none;cursor:pointer;font-size:11px;font-weight:650;border-radius:7px;padding:3px 9px;border:1px solid #c9cfdb;background:#f3f5f9;color:#3a4660;transition:.12s}
 .vbtn.up:hover,.vbtn.up.mine{border-color:#2e7d52;color:#16653c;background:#dcf3e6}
 .vbtn.down:hover,.vbtn.down.mine{border-color:#b14a4a;color:#9b2f2f;background:#f7dede}
 .vtally{font-size:11px;color:#6b7688;font-weight:700;margin-left:2px}
 header h1{font-size:15px;font-weight:650;margin:0}
 header .sub{font-size:12px;color:var(--muted)}
 #map{flex:1;background:#0d1426}
 .leaflet-tooltip.dlabel{background:transparent;border:none;box-shadow:none;color:#0c1320;font-size:10px;font-weight:700;text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 3px #fff;padding:0}
 .leaflet-tooltip.dlabel.dark{color:#fff;text-shadow:0 0 2px #000,0 0 3px #000,0 0 4px #000}
 .panel{position:absolute;z-index:1000;background:rgba(16,26,46,.93);border:1px solid var(--line);border-radius:10px;padding:12px 13px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
 #ctrl{position:absolute;top:100%;left:12px;margin-top:7px;z-index:1100;display:flex;flex-direction:column;gap:9px;min-width:204px;background:rgba(16,26,46,.97);border:1px solid var(--line);border-radius:10px;padding:12px 13px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);box-shadow:0 12px 30px #0008;transform-origin:top left;transition:opacity .14s ease,transform .14s ease}
 #ctrl:not(.open){opacity:0;transform:scaleY(.93) translateY(-8px);pointer-events:none;visibility:hidden}
 #ctrl.open{opacity:1;transform:none;visibility:visible}
 #ctrl .cap{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);display:block;margin-bottom:4px}
 #ctrl select{width:100%;background:#0b1322;color:#e8eef6;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:12.5px}
 #ctrl .grp{border-top:1px solid var(--line);padding-top:9px}
 .row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px}
 input[type=range]{width:96px;accent-color:#7aa7d6}
 .switch{position:relative;width:38px;height:20px;flex:none}.switch input{display:none}
 .slider{position:absolute;inset:0;background:#2a3551;border-radius:20px;transition:.15s;cursor:pointer}
 .slider:before{content:"";position:absolute;height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
 .switch input:checked + .slider{background:#3f7cc0}.switch input:checked + .slider:before{transform:translateX(18px)}
 .phead{display:flex;align-items:center;justify-content:space-between;gap:10px}
 #legend .phead,#sources .phead{margin-bottom:9px}
 .ptitle{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
 .pbtn{-webkit-appearance:none;appearance:none;background:#0b1322;border:1px solid var(--line);color:#cdd6e4;border-radius:7px;width:28px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;flex:none}
 .pbtn:hover{border-color:#3a4660;color:#fff}.pbtn svg{width:15px;height:15px}
 #legend{right:12px;bottom:18px;min-width:208px;max-width:240px;max-height:70vh;overflow:auto}
 #legend .ltitle{font-size:11px;font-weight:600;margin-bottom:9px}
 .cbrow{display:flex;gap:8px;height:140px}
 .cbar{width:16px;border-radius:4px;border:1px solid rgba(255,255,255,.25)}
 .ticks{display:flex;flex-direction:column;justify-content:space-between;font-size:10.5px;color:var(--muted)}
 .tiers{margin-top:10px;border-top:1px solid var(--line);padding-top:9px;display:flex;flex-direction:column;gap:5px}
 .tier{display:flex;align-items:center;gap:8px;font-size:11.5px}
 .tier .sw{width:13px;height:13px;border-radius:3px;border:1px solid rgba(255,255,255,.25);flex:none}
 .tier small{color:var(--muted)}
 #sources{left:12px;bottom:18px;min-width:230px;max-width:300px;max-height:70vh;overflow:auto}
 #sources .ltitle{font-size:11px;font-weight:600;margin-bottom:8px}
 .snote{font-size:11px;color:#c4d0e0;line-height:1.45;margin-bottom:9px}
 .slist{margin:0 0 9px;padding-left:16px;font-size:11.5px;line-height:1.5}
 .slist a{color:#86b4e6}
 .scat{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#7f8ca3;font-weight:700;margin:11px 0 3px}
 .sfoot{font-size:10px;color:var(--muted);border-top:1px solid var(--line);padding-top:7px;line-height:1.4}
 .pill{display:inline-block;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:700;color:#0c1320}
 .launch{position:absolute;z-index:1001;background:rgba(16,26,46,.95);border:1px solid var(--line);color:#e8eef6;border-radius:10px;cursor:pointer;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);display:flex;align-items:center;gap:7px;box-shadow:0 2px 10px #0006;font-size:12px;font-weight:600;padding:10px 13px}
 .launch:hover{border-color:#3a4660}.launch svg{width:16px;height:16px;flex:none}
 #legendOpen{right:12px;bottom:18px}#sourcesOpen{left:12px;bottom:18px}
 #ctrlOpen{display:none}
 #search{margin-left:auto;display:flex;align-items:center;gap:6px;position:relative}
 #search input{background:#0b1322;border:1px solid var(--line);color:#e8eef6;border-radius:8px;padding:7px 10px;font-size:13px;width:200px;outline:none}
 #search input::placeholder{color:#5f6c82}#search input:focus{border-color:#3f7cc0}
 #search button{-webkit-appearance:none;appearance:none;background:#0b1322;border:1px solid var(--line);color:#cdd6e4;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
 #search button:hover{border-color:#3a4660;color:#fff}#search button svg{width:16px;height:16px}
 #search .smsg{position:absolute;top:100%;left:2px;font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;text-shadow:0 1px 2px #000}
 .pinwrap{background:transparent;border:none}
 .reppin{background:transparent;border:none;overflow:visible}
 .reppin::after{content:"";position:absolute;left:12px;top:34px;width:10px;height:10px;margin:-5px 0 0 -5px;border-radius:50%;background:rgba(139,92,246,.5);animation:reppulse 1.4s ease-out infinite;pointer-events:none}
 @keyframes reppulse{0%{transform:scale(.5);opacity:.85}100%{transform:scale(3.2);opacity:0}}
 .rhere{font-size:11px;color:#9aa6bb;margin-top:7px;line-height:1.35}
 .rhere b{color:#cbd5e6}
 .rthanks{font-size:12.5px;color:#1f7a4d;font-weight:650;line-height:1.4;padding:1px 2px}
 .remail{margin-top:8px;border-top:1px solid #d7dce5;padding-top:7px}
 .remailhint{font-size:10.5px;color:#6b7688;margin-bottom:4px}
 .remailrow{display:flex;gap:5px}
 .remailrow input{flex:1;min-width:0;font-size:12px;padding:5px 7px;border:1px solid #c9cfdb;border-radius:6px;background:#fff;color:#222}
 .remailrow button{font-size:11px;font-weight:650;padding:5px 9px;border:1px solid #3f7cc0;background:#3f7cc0;color:#fff;border-radius:6px;cursor:pointer;white-space:nowrap}
 .remailrow button:disabled{opacity:.5;cursor:default}
 .remailok{font-size:11.5px;color:#1f7a4d;font-weight:600}
 .hidden{display:none!important}
 #hint{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:1200;display:none;background:#3a2326;border:1px solid #6b3b3b;color:#ffd9d9;font-size:12px;padding:8px 12px;border-radius:8px;max-width:340px;text-align:center;line-height:1.4}
 .vbtn.flag:hover{border-color:#b14a4a;color:#9b2f2f;background:#f7dede}
 .fbbtn{width:auto;padding:0 12px;gap:6px;font-size:12.5px;font-weight:600}
 .fbbtn span{white-space:nowrap}
 #modal{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center}
 .mback{position:absolute;inset:0;background:#0009;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
 .mcard{position:relative;z-index:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;width:min(92vw,380px);max-height:86vh;overflow:auto;box-shadow:0 20px 50px #000a}
 .mcard h3{margin:0 0 4px;font-size:15px}
 .msub{margin:0 0 12px;font-size:12px;color:var(--muted);line-height:1.45}
 .optlist{display:flex;flex-direction:column;gap:6px;margin:0 0 12px}
 .opt{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;cursor:pointer;font-size:13px;background:#0b1322}
 .opt:hover{border-color:#3a4660}.opt.sel{border-color:#3f7cc0;background:#16223a}
 .opt input{accent-color:#3f7cc0;flex:none}
 .mfield{margin:0 0 10px}
 .mfield>label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:5px}
 .mfield textarea,.mfield input[type=email]{width:100%;background:#0b1322;border:1px solid var(--line);color:#e8eef6;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit}
 .mfield textarea{min-height:64px;resize:vertical}
 .chips{display:flex;flex-wrap:wrap;gap:6px}
 .chip{padding:5px 10px;border:1px solid var(--line);border-radius:20px;font-size:12px;cursor:pointer;background:#0b1322;color:#cdd6e4}
 .chip:hover{border-color:#3a4660}.chip.sel{border-color:#3f7cc0;background:#16223a;color:#fff}
 .mrow{display:flex;gap:8px;margin-top:6px}
 .mbtn{flex:1;-webkit-appearance:none;appearance:none;border-radius:9px;padding:10px;font-size:13px;font-weight:650;cursor:pointer;border:1px solid var(--line);background:#0b1322;color:#cdd6e4}
 .mbtn:hover{border-color:#3a4660}
 .mbtn.primary{background:#3f7cc0;border-color:#3f7cc0;color:#fff}
 .mbtn.primary:disabled{opacity:.5;cursor:not-allowed}
 .mmsg{font-size:12px;margin-top:10px;line-height:1.4;min-height:1px}
 .mmsg.ok{color:#9fe6c0}.mmsg.err{color:#ffb4b4}
 #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:2500;background:#16223a;border:1px solid #3f7cc0;color:#eaf2ff;padding:12px 16px;border-radius:10px;font-size:13px;max-width:340px;text-align:center;line-height:1.45;box-shadow:0 10px 30px #0008}
 @media(max-width:680px){#search{margin-left:0;width:100%}#search input{flex:1;width:auto}#legend,#sources{max-width:46vw;min-width:0}}
</style></head>
<body><div id="app">
 <header>
   <button id="menuBtn" class="hbtn" aria-label="Map controls" aria-expanded="false" title="Map controls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
   <h1 id="h1">City Safety Map</h1>
   <span class="sub" id="sub"></span>
   <div id="search">
     <input id="searchInput" type="text" placeholder="Search address or district…" autocomplete="off" enterkeyhint="search"/>
     <button id="searchBtn" title="Search" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></button>
     <span class="smsg" id="searchMsg"></span>
   </div>
   <button id="fbBtn" class="hbtn fbbtn" title="Send feedback" aria-label="Send feedback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v14H4z"/><path d="M4 7l8 6 8-6"/></svg><span>Feedback</span></button>
   <div id="ctrl">
     <div><span class="cap">City</span><select id="city"></select></div>
     <div class="grp"><span class="cap">Underlay</span>
       <select id="base">
         <option value="osm" selected>Street map (OSM)</option>
         <option value="sat">Aerial / satellite</option>
         <option value="cartoDark">Dark</option>
         <option value="cartoLight">Light / minimal</option>
       </select></div>
     <div class="grp">
       <div class="row"><span>Risk fill</span><input type="range" id="op" min="0" max="100" value="72"></div>
       <div class="row" style="margin-top:7px"><span>District names</span><label class="switch"><input type="checkbox" id="lbl" checked><span class="slider"></span></label></div>
       <div class="row" style="margin-top:7px"><span>Borders</span><label class="switch"><input type="checkbox" id="bord" checked><span class="slider"></span></label></div>
     </div>
   </div>
 </header>
 <div id="map"></div><div id="hint"></div>

 <div id="legend" class="panel">
   <div class="phead"><span class="ptitle">Legend</span>
     <button class="pbtn" id="legendCollapse" title="Collapse" aria-label="Collapse legend"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l7 7 7-7"/></svg></button></div>
   <div class="ltitle">Security risk (1 = safe &rarr; 10 = high)</div>
   <div class="cbrow"><div class="cbar" id="lg-bar"></div>
     <div class="ticks"><span>10</span><span>8</span><span>6</span><span>4</span><span>2</span><span>1</span></div></div>
   <div class="tiers">
     <div class="tier"><span class="sw" id="sw1"></span>Safe <small>&nbsp;1&ndash;2.5</small></div>
     <div class="tier"><span class="sw" id="sw2"></span>Moderate <small>&nbsp;2.5&ndash;5</small></div>
     <div class="tier"><span class="sw" id="sw3"></span>Caution <small>&nbsp;5&ndash;7.5</small></div>
     <div class="tier"><span class="sw" id="sw4"></span>Avoid <small>&nbsp;7.5&ndash;10</small></div>
   </div>
 </div>
 <button class="launch hidden" id="legendOpen" title="Show legend" aria-label="Show legend"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h10M4 12h10M4 17h10"/></svg><span>Legend</span></button>

 <div id="sources" class="panel hidden">
   <div class="phead"><span class="ptitle">Sources &amp; method</span>
     <button class="pbtn" id="sourcesCollapse" title="Collapse" aria-label="Collapse sources"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l7 7 7-7"/></svg></button></div>
   <div id="sourcesBody"></div>
 </div>
 <button class="launch" id="sourcesOpen" title="Show sources" aria-label="Show sources"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg><span>Sources</span></button>

 <div id="modal" class="hidden"><div class="mback"></div><div class="mcard" id="mcard"></div></div>
 <div id="toast" class="hidden"></div>
</div>
<script>
const CITIES = /*__CITIES__*/{};
const CMAP = /*__CMAP__*/[];
const CAT = /*__CATEGORIES__*/{};
const MAPTILER_KEY='__MAPTILER_KEY__';  // injected by build.js from maptiler.key / $MAPTILER_KEY (empty → OSM/Nominatim fallback)
const DET=['sao-paulo','mexico-city','bogota','rio-de-janeiro','medellin','santiago','buenos-aires','lima','arequipa','guadalajara','monterrey','toluca','puebla','queretaro','aguascalientes','sanluispotosi','cuernavaca','belohorizonte','recife','salvador','fortaleza','curitiba','campinas','goiania','belem','maceio','vitoria','havana','santodomingo','panamacity','guatemalacity','sansalvador','asuncion','bucaramanga'];
const CITYLEVEL=Object.keys(CITIES).filter(k=>(CITIES[k].tier_level||'city')==='city').sort((a,b)=>CITIES[a].name.localeCompare(CITIES[b].name,'en'));
function dashSlug(s){return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
const SLUG={},FROMSLUG={};
Object.keys(CITIES).forEach(k=>{const s=dashSlug(CITIES[k].name);SLUG[k]=s;FROMSLUG[s]=k;FROMSLUG[k.toLowerCase()]=k;FROMSLUG[s.replace(/-/g,'')]=k;if(CITIES[k].slug)FROMSLUG[String(CITIES[k].slug).toLowerCase()]=k;});
Object.assign(FROMSLUG,{cdmx:'mexico-city',mexico:'mexico-city',riodejaneiro:'rio-de-janeiro',ba:'buenos-aires',sp:'sao-paulo'});
// Pretty path routing: /sao-paulo, /mexico-city … with legacy #saopaulo and ?city= still accepted.
function keyFromUrl(){
  let seg=decodeURIComponent(location.pathname).replace(/^\/+|\/+$/g,'');
  if(seg==='index.html'||seg==='404.html')seg='';
  let raw=(seg||location.hash.replace(/^#\/?/,'')||new URLSearchParams(location.search).get('city')||'').toLowerCase();
  if(CITIES[FROMSLUG[raw]])return FROMSLUG[raw];
  let s=raw.replace(/[^a-z0-9]/g,'');
  return CITIES[FROMSLUG[s]]?FROMSLUG[s]:(CITIES[raw]?raw:'sao-paulo');
}
let cityKey='sao-paulo';
function hx(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function lerp(a,b,t){return a+(b-a)*t}
function color(s){
  if(s==null) return '#5b6472';
  let t=Math.max(0,Math.min(1,(s-1)/9));
  for(let i=1;i<CMAP.length;i++){ if(t<=CMAP[i][0]){
    const [t0,c0]=CMAP[i-1],[t1,c1]=CMAP[i],u=(t-t0)/((t1-t0)||1),a=hx(c0),b=hx(c1);
    return `rgb(${Math.round(lerp(a[0],b[0],u))},${Math.round(lerp(a[1],b[1],u))},${Math.round(lerp(a[2],b[2],u))})`;}}
  return CMAP[CMAP.length-1][1];
}
function tierName(s){ if(s==null)return['Not assessed','#5b6472'];
  if(s<2.5)return['Safe',color(s)]; if(s<5)return['Moderate',color(s)];
  if(s<7.5)return['Caution',color(s)]; return['Avoid',color(s)];}
document.getElementById('lg-bar').style.background='linear-gradient(to top,'+CMAP.map(s=>s[1]+' '+(s[0]*100).toFixed(1)+'%').join(',')+')';
sw1.style.background=color(1.6);sw2.style.background=color(3.7);sw3.style.background=color(6.2);sw4.style.background=color(8.7);
const map=L.map('map',{zoomControl:false,attributionControl:true,minZoom:3}).setView([-23.6,-46.6],11);
L.control.zoom({position:'topright'}).addTo(map);
function mk(u,o){return L.tileLayer(u,Object.assign({maxZoom:19},o))}
function freeBases(){return {
 osm:mk('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{subdomains:'abc',attribution:'&copy; OpenStreetMap'}),
 sat:mk('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Imagery &copy; Esri'}),
 cartoLight:mk('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{subdomains:'abcd',attribution:'&copy; OSM &copy; CARTO'}),
 cartoDark:mk('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',{subdomains:'abcd',attribution:'&copy; OSM &copy; CARTO'})
};}
function maptilerBases(){
  const A='&copy; <a href="https://www.maptiler.com/copyright/" target="_blank" rel="noopener">MapTiler</a> &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>';
  const mt=(id,ext)=>mk(`https://api.maptiler.com/maps/${id}/{z}/{x}/{y}.${ext||'png'}?key=${MAPTILER_KEY}`,{attribution:A,tileSize:512,zoomOffset:-1,maxZoom:20});
  return {osm:mt('streets-v2'),sat:mt('satellite','jpg'),cartoLight:mt('dataviz-light'),cartoDark:mt('dataviz-dark')};
}
let bases = MAPTILER_KEY ? maptilerBases() : freeBases();
const DARKBASE={osm:false,sat:true,cartoLight:false,cartoDark:true};
let curKey='osm', curBase=bases.osm.addTo(map);
let tileErr=0,tileOk=false,fellBack=false;
function onTileOk(){tileOk=true;hint.style.display='none';}
function onTileErr(){
  if(++tileErr<3||tileOk)return;
  if(MAPTILER_KEY&&!fellBack){ // MapTiler not serving here (e.g. this origin isn't on the key) → free tiles so the map never goes grey

  try{
    const res=await geocode(q);
    if(!res){setMsg('No match found');return;}
    setMsg(''); dropPin(res.lat,res.lon); map.flyTo([res.lat,res.lon],14);
    const d=districtAt(res.lon,res.lat);
    if(d)openDistrict(d,[res.lat,res.lon]);
    else L.popup().setLatLng([res.lat,res.lon]).setContent(`<b>${res.name.split(',').slice(0,2).join(', ')}</b><br><span style="color:#8896ad">outside the mapped areas</span>`).openOn(map);
  }catch(e){setMsg('Search needs the live site (blocked here)');}
}
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSearch();}});
document.getElementById('searchBtn').addEventListener('click',doSearch);
function init(tries){ tries=tries||0; try{map.invalidateSize();}catch(e){}
  if(!map.getSize().x && tries<20){ return setTimeout(()=>init(tries+1),60); }
  buildCity(keyFromUrl()); }
if(document.readyState==='complete') init(); else window.addEventListener('load',init);
window.addEventListener('popstate',()=>{const k=keyFromUrl(); if(k!==cityKey) buildCity(k,{fromPop:true});});
window.addEventListener('hashchange',()=>{const k=keyFromUrl(); if(k!==cityKey) buildCity(k);});
</script>
